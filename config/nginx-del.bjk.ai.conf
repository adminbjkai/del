server {
    listen 80;
    server_name del.bjk.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name del.bjk.ai;

    ssl_certificate /etc/letsencrypt/live/bjk.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bjk.ai/privkey.pem;

    client_max_body_size 50M;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;
    add_header Strict-Transport-Security "max-age=31536000" always;

    # DEL documentation site (Fern docs dev server), basic-auth protected.
    # The Fern preview server's static assets are served from an absolute
    # /_next/ path regardless of the docs base path, so that path must also
    # be proxied here alongside /docs itself.
    location /_local {
        auth_basic "DEL docs";
        auth_basic_user_file /etc/nginx/.del-docs-htpasswd;
        proxy_pass http://127.0.0.1:8073;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300;
    }

    location /_next/ {
        auth_basic "DEL docs";
        auth_basic_user_file /etc/nginx/.del-docs-htpasswd;

        proxy_pass http://127.0.0.1:8072;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    location /docs {
        auth_basic "DEL docs";
        auth_basic_user_file /etc/nginx/.del-docs-htpasswd;

        proxy_pass http://127.0.0.1:8072;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    location /docs/ {
        auth_basic "DEL docs";
        auth_basic_user_file /etc/nginx/.del-docs-htpasswd;

        proxy_pass http://127.0.0.1:8072;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
    }

    location = /inventory { return 301 /miscwork.html; }
    location = /miscwork.html {
        auth_basic "DEL inventory";
        auth_basic_user_file /etc/nginx/.del-docs-htpasswd;
        alias /apps/del/miscwork/miscwork.html;
        default_type text/html;
    }

    location / {
        proxy_pass http://127.0.0.1:8075;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
